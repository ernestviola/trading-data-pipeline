# if file has changed then: docker compose up --build
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_META_CONN}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    PYTHONPATH: /opt/airflow/trading-scripts
    # Overrides .env's SNOWFLAKE_PRIVATE_KEY_PATH, which is a host path
    # (e.g. /Users/you/.snowflake/snowflake_key.p8) for local script runs.
    # That path doesn't exist inside the container - only the mount below
    # does - so it needs a container-side value here instead.
    SNOWFLAKE_PRIVATE_KEY_PATH: /opt/airflow/.snowflake/snowflake_key.p8
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./trading-scripts:/opt/airflow/trading-scripts
    - ./dbt:/opt/airflow/dbt
    - ${SNOWFLAKE_PRIVATE_KEY_PATH}:/opt/airflow/.snowflake/snowflake_key.p8:ro
  env_file:
    - .env

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_META_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_META_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_META_POSTGRES_DB}
    volumes:
      - airflow_meta_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${AIRFLOW_META_POSTGRES_USER} -d ${AIRFLOW_META_POSTGRES_DB}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
      airflow users create --username admin --password admin
      --firstname admin --lastname admin --role Admin --email admin@example.com"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - '8080:8080'
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  airflow_meta_data:

networks:
  default:
    name: trading-net
    external: true
