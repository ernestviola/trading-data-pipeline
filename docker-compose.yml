# if file has changed then: docker compose up --build
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_META_CONN}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    DATABASE_URL: ${DATABASE_URL}
    PYTHONPATH: /opt/airflow/trading-scripts
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./trading-scripts:/opt/airflow/trading-scripts
    - ./dbt:/opt/airflow/dbt
  env_file:
    - .env

services:
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
      airflow users create --username admin --password admin
      --firstname admin --lastname admin --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - '8080:8080'
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

networks:
  default:
    name: trading-net
    external: true
