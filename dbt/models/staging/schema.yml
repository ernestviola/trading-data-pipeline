version: 2

models:
  - name: stg_prices
    description: >
      Daily OHLCV price data per ticker, staged from raw Alpaca market data.
      One row per (symbol, price_date).
    columns:
      - name: symbol
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: close
        tests:
          - not_null

  - name: stg_trades
    description: >
      Simulated trade signals generated by a strategy, staged from raw
      trade output. One row per executed buy/sell signal.
    columns:
      - name: ticker
        tests:
          - not_null
      - name: trade_date
        tests:
          - not_null
      - name: side
        description: "Trade direction: 'buy' or 'sell'."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['buy', 'sell']
      - name: quantity
        tests:
          - not_null

  - name: stg_market_calendar
    description: >
      Trading calendar dates only, narrowed from the raw seed (open/close
      times dropped — not currently used downstream). Used to determine the
      most recent expected trading day for freshness checks.
    columns:
      - name: market_date
        description: 'A date on which the market was open for trading.'
        tests:
          - not_null
