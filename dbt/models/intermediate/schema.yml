version: 2

models:
  - name: int_position_cost_basis
    columns:
      - name: ticker
        tests:
          - not_null
      - name: trade_date
        tests:
          - not_null
      - name: shares_held
        tests:
          - not_null
  - name: int_portfolio_cash
    columns:
      - name: ticker
        tests:
          - not_null
      - name: trade_date
        tests:
          - not_null
      - name: cash_after
        tests:
          - not_null
      - name: rn
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - strategy_used
            - ticker
            - rn
