version: 2

models:
  - name: stg_prices
    columns:
      - name: symbol
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: close
        tests:
          - not_null

  - name: stg_trades
    columns:
      - name: ticker
        tests:
          - not_null
      - name: trade_date
        tests:
          - not_null
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['buy', 'sell']
      - name: quantity
        tests:
          - not_null
